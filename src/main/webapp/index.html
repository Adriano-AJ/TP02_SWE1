<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Produtos</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 1.5rem; }
        nav { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            text-decoration: none;
            color: white;
            background-color: #007bff;
            padding: 12px;
            border-radius: 6px;
            font-weight: 500;
            transition: background 0.3s ease;
        }
        .btn:hover { background-color: #0056b3; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Menu</h1>
        <nav>
            <a href="listaProdutos" class="btn">Listar Produtos</a>
            <a href="novoProduto.jsp" class="btn">Cadastrar Novo Produto</a>
            <a href="alteraProduto.jsp" class="btn">Alterar Produto</a>
            <a href="creditos.html" class="btn btn-secondary">Dupla</a>
        </nav>
    </div>
</body>
</html>
